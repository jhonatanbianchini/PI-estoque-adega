services:
  - type: web
    name: estoque-api
    env: node
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString

      - key: JWT_SECRET
        value: chave_super_secreta

      - key: NODE_ENV
        value: production

databases:
  - name: estoque-db